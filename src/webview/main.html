<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lean Snippet</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        color: var(--vscode-foreground);
        background-color: var(--vscode-sideBar-background);
      }

      /* 标签页导航 */
      .tab-navigation {
        display: flex;
        flex-shrink: 0;
        padding: 0 12px;
        background: var(--vscode-editorGroupHeader-tabsBackground);
        border-bottom: 1px solid var(--vscode-editorGroupHeader-tabsBorder);
      }

      .tab-item {
        position: relative;
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 10px 16px;
        font-size: 13px;
        color: var(--vscode-tab-inactiveForeground);
        cursor: pointer;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        transition: all 0.2s ease;
      }

      .tab-item:hover {
        color: var(--vscode-tab-activeForeground);
      }

      .tab-item.active {
        color: var(--vscode-tab-activeForeground);
        border-bottom-color: var(--vscode-focusBorder);
      }

      /* 内容区域 */
      .tab-content {
        display: none;
        flex: 1;
        padding: 20px;
        overflow-y: auto;
      }

      .tab-content.active {
        display: block;
      }

      /* 卡片样式 */
      .card {
        padding: 16px;
        margin-bottom: 16px;
        background: var(--vscode-editor-background);
        border: 1px solid var(--vscode-widget-border);
        border-radius: 6px;
      }

      .card-title {
        margin-bottom: 12px;
        font-size: 14px;
        font-weight: 600;
        color: var(--vscode-foreground);
      }

      /* 可折叠卡片 */
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }

      .card-header .card-title {
        margin-bottom: 0;
      }

      .card-toggle {
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
        transition: transform 0.2s;
      }

      .card.collapsed .card-toggle {
        transform: rotate(-90deg);
      }

      .card-body {
        overflow: hidden;
        transition:
          max-height 0.25s ease,
          margin-top 0.25s ease,
          opacity 0.2s ease;
        max-height: 800px;
        margin-top: 12px;
        opacity: 1;
      }

      .card.collapsed .card-body {
        max-height: 0;
        margin-top: 0;
        opacity: 0;
      }

      /* 紧凑表单 */
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      /* 快捷操作按钮 */
      .quick-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .quick-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
        cursor: pointer;
        background: transparent;
        border: 1px solid var(--vscode-widget-border);
        border-radius: 3px;
        transition: all 0.15s;
      }

      .quick-btn:hover {
        color: var(--vscode-foreground);
        border-color: var(--vscode-focusBorder);
      }

      /* 表单样式 */
      .form-group {
        margin-bottom: 10px;
      }

      .form-label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: var(--vscode-foreground);
      }

      .form-input,
      .form-select,
      .form-textarea {
        width: 100%;
        padding: 8px 12px;
        font-size: 13px;
        color: var(--vscode-input-foreground);
        background: var(--vscode-input-background);
        border: 1px solid var(--vscode-input-border);
        border-radius: 4px;
      }

      .form-textarea {
        min-height: 80px;
        font-family: "Consolas", "Monaco", monospace;
        resize: vertical;
      }

      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        outline: none;
        border-color: var(--vscode-focusBorder);
      }

      .form-hint {
        margin-top: 4px;
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
      }

      /* 按钮样式 */
      .btn {
        padding: 8px 16px;
        font-size: 13px;
        color: var(--vscode-button-foreground);
        cursor: pointer;
        background: var(--vscode-button-background);
        border: none;
        border-radius: 4px;
        transition: background 0.2s;
      }

      .btn:hover {
        background: var(--vscode-button-hoverBackground);
      }

      .btn-block {
        width: 100%;
      }

      /* 快捷键列表 */
      .kb-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .kb-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-radius: 4px;
        border: 1px solid var(--vscode-widget-border);
        background: var(--vscode-editor-background);
      }

      .kb-item:hover {
        border-color: var(--vscode-focusBorder);
      }

      .kb-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
        min-width: 0;
      }

      .kb-name {
        font-size: 12px;
        color: var(--vscode-foreground);
      }

      .kb-key {
        display: inline-block;
        padding: 2px 8px;
        font-size: 11px;
        font-family: "Consolas", "Monaco", monospace;
        color: var(--vscode-badge-foreground);
        background: var(--vscode-badge-background);
        border-radius: 3px;
        width: fit-content;
      }

      .kb-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
        margin-left: 8px;
      }

      .keybinding-input {
        width: 110px;
        padding: 3px 6px;
        font-size: 11px;
        font-family: "Consolas", "Monaco", monospace;
        color: var(--vscode-input-foreground);
        background: var(--vscode-input-background);
        border: 1px solid var(--vscode-input-border);
        border-radius: 3px;
      }

      .keybinding-btn {
        padding: 3px 8px;
        font-size: 11px;
        cursor: pointer;
        border: none;
        border-radius: 3px;
        transition: all 0.15s;
      }

      .keybinding-save {
        color: var(--vscode-button-foreground);
        background: var(--vscode-button-background);
      }

      .keybinding-save:hover {
        background: var(--vscode-button-hoverBackground);
      }

      .keybinding-reset {
        color: var(--vscode-descriptionForeground);
        background: transparent;
        border: 1px solid var(--vscode-widget-border);
      }

      .keybinding-reset:hover {
        color: var(--vscode-foreground);
        border-color: var(--vscode-focusBorder);
      }

      .keybinding-btn:hover {
        opacity: 0.8;
      }

      /* 片段列表 */
      .snippet-list-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .snippet-list-header .card-title {
        margin-bottom: 0;
      }

      .snippet-count {
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
      }

      .snippet-filter {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .filter-tag {
        padding: 3px 10px;
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
        cursor: pointer;
        background: var(--vscode-editor-background);
        border: 1px solid var(--vscode-widget-border);
        border-radius: 12px;
        transition: all 0.15s;
      }

      .filter-tag:hover {
        border-color: var(--vscode-focusBorder);
        color: var(--vscode-foreground);
      }

      .filter-tag.active {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border-color: var(--vscode-button-background);
      }

      .snippet-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        margin-bottom: 6px;
        background: var(--vscode-editor-background);
        border: 1px solid var(--vscode-widget-border);
        border-radius: 4px;
        cursor: pointer;
        transition: border-color 0.15s;
      }

      .snippet-item:hover {
        border-color: var(--vscode-focusBorder);
      }

      .snippet-info {
        flex: 1;
        min-width: 0;
      }

      .snippet-name {
        font-weight: 600;
        font-size: 13px;
        color: var(--vscode-foreground);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .snippet-meta {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 3px;
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
      }

      .snippet-prefix {
        padding: 1px 6px;
        font-family: "Consolas", "Monaco", monospace;
        font-size: 11px;
        color: var(--vscode-textLink-foreground);
        background: var(--vscode-textBlockQuote-background);
        border-radius: 3px;
      }

      .snippet-lang {
        padding: 1px 6px;
        font-size: 10px;
        text-transform: uppercase;
        border-radius: 3px;
        background: var(--vscode-badge-background);
        color: var(--vscode-badge-foreground);
      }

      .snippet-desc {
        margin-top: 2px;
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .snippet-preview {
        display: none;
        margin-top: 8px;
        padding: 8px;
        font-family: "Consolas", "Monaco", monospace;
        font-size: 11px;
        line-height: 1.5;
        color: var(--vscode-editor-foreground);
        background: var(--vscode-textBlockQuote-background);
        border-radius: 4px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }

      .snippet-item.expanded .snippet-preview {
        display: block;
      }

      .snippet-actions-col {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }

      .snippet-action-btn {
        padding: 2px 6px;
        font-size: 11px;
        cursor: pointer;
        border: none;
        border-radius: 3px;
        background: transparent;
        color: var(--vscode-descriptionForeground);
        transition: all 0.15s;
      }

      .snippet-action-btn:hover {
        color: var(--vscode-foreground);
        background: var(--vscode-list-hoverBackground);
      }

      .snippet-action-btn.delete:hover {
        color: var(--vscode-errorForeground);
      }

      .snippet-empty {
        padding: 20px;
        text-align: center;
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
      }

      #snippet-list {
        max-height: 360px;
        overflow-y: auto;
      }

      /* 语言选择器 */
      .lang-select-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .lang-custom-input {
        display: none;
      }

      .lang-custom-input.visible {
        display: block;
      }

      /* 导入导出区域 */
      .import-export-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 400px) {
        .quick-actions {
          grid-template-columns: 1fr;
        }

        .import-export-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- 标签页导航 -->
    <div class="tab-navigation">
      <button type="button" class="tab-item active" data-tab="snippets">
        <span>代码片段</span>
      </button>
      <button type="button" class="tab-item" data-tab="keybindings">
        <span>快捷键</span>
      </button>
    </div>

    <!-- 代码片段内容 -->
    <div class="tab-content active" id="snippets-tab">
      <div class="card">
        <div class="snippet-list-header">
          <h3 class="card-title">当前片段</h3>
          <span class="snippet-count" id="snippet-count"></span>
        </div>
        <div class="snippet-filter" id="snippet-filter"></div>
        <div id="snippet-list"></div>
      </div>

      <div class="card collapsed" id="add-snippet-card">
        <div class="card-header" onclick="toggleCard('add-snippet-card')">
          <h3 class="card-title">添加新片段</h3>
          <span class="card-toggle">▼</span>
        </div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">名称</label>
              <input
                type="text"
                class="form-input"
                id="snippet-name"
                placeholder="React 函数组件"
              />
            </div>
            <div class="form-group">
              <label class="form-label">触发前缀</label>
              <input
                type="text"
                class="form-input"
                id="snippet-prefix"
                placeholder="rfc"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">语言</label>
              <div class="lang-select-wrap">
                <select
                  class="form-select"
                  id="snippet-language"
                  onchange="onLangSelectChange()"
                >
                  <option value="javascript">JavaScript</option>
                  <option value="typescript">TypeScript</option>
                  <option value="vue">Vue</option>
                  <option value="html">HTML</option>
                  <option value="css">CSS</option>
                  <option value="python">Python</option>
                  <option value="go">Go</option>
                  <option value="rust">Rust</option>
                  <option value="java">Java</option>
                  <option value="json">JSON</option>
                  <option value="__custom__">自定义...</option>
                </select>
                <input
                  type="text"
                  class="form-input lang-custom-input"
                  id="snippet-language-custom"
                  placeholder="输入自定义语言，如 scss, dart"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">描述</label>
              <input
                type="text"
                class="form-input"
                id="snippet-description"
                placeholder="简短描述"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">代码内容</label>
            <textarea
              class="form-textarea"
              id="snippet-body"
              placeholder="输入代码内容...  使用 $1, $2 等作为制表位"
            ></textarea>
          </div>
          <button type="button" class="btn btn-block" onclick="addSnippet()">
            添加代码片段
          </button>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">导入/导出</h3>
        <div class="import-export-grid">
          <div>
            <button
              type="button"
              class="btn btn-block"
              onclick="importSnippets()"
            >
              导入片段
            </button>
            <div class="form-hint" style="margin-top: 8px">
              从 JSON 文件导入
            </div>
          </div>
          <div>
            <select
              class="form-select"
              id="export-language"
              style="margin-bottom: 8px"
            >
              <option value="all">所有语言</option>
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="vue">Vue</option>
              <option value="html">HTML</option>
            </select>
            <button
              type="button"
              class="btn btn-block"
              onclick="exportSnippets()"
            >
              导出片段
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 快捷键内容 -->
    <div class="tab-content" id="keybindings-tab">
      <div class="card">
        <h3 class="card-title">快速操作</h3>
        <div class="quick-actions">
          <button
            type="button"
            class="quick-btn"
            onclick="insertLog()"
            title="将选中的变量/文本进行 console.log 具名打印"
          >
            插入日志
          </button>
          <button
            type="button"
            class="quick-btn"
            onclick="deleteAllLogs()"
            title="删除当前文件中所有的 console.log 等日志语句"
          >
            清理日志
          </button>
          <button
            type="button"
            class="quick-btn"
            onclick="insertChoose()"
            title="选择要插入的日志类型（log/warn/error 等）"
          >
            选择插入
          </button>
        </div>
      </div>
      <div class="card">
        <h3 class="card-title">快捷键配置</h3>
        <div class="kb-list" id="keybindings-list">
          <!-- 动态生成 -->
        </div>
      </div>
    </div>

    <script>
      "use strict";
      /* global acquireVsCodeApi */
      const vscode = acquireVsCodeApi();

      // 折叠卡片
      function toggleCard(cardId) {
        const card = document.getElementById(cardId);
        if (card) card.classList.toggle("collapsed");
      }

      // 语言选择切换
      function onLangSelectChange() {
        const sel = document.getElementById("snippet-language");
        const customInput = document.getElementById("snippet-language-custom");
        if (sel.value === "__custom__") {
          customInput.classList.add("visible");
          customInput.focus();
        } else {
          customInput.classList.remove("visible");
          customInput.value = "";
        }
      }

      function getSelectedLanguage() {
        const sel = document.getElementById("snippet-language");
        if (sel.value === "__custom__") {
          return document
            .getElementById("snippet-language-custom")
            .value.trim()
            .toLowerCase();
        }
        return sel.value;
      }

      // 标签切换
      document.querySelectorAll(".tab-item").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab-item").forEach((t) => {
            t.classList.remove("active");
          });
          document.querySelectorAll(".tab-content").forEach((c) => {
            c.classList.remove("active");
          });

          tab.classList.add("active");
          const tabId = `${tab.dataset.tab}-tab`;
          document.getElementById(tabId).classList.add("active");

          if (tab.dataset.tab === "keybindings") {
            vscode.postMessage({ type: "getKeybindings" });
          }
          if (tab.dataset.tab === "snippets") {
            vscode.postMessage({ type: "getSnippets" });
          }
        });
      });

      // 片段列表
      let allSnippets = [];
      let currentFilter = "all";

      const LANG_LABELS = {
        javascript: "JS",
        typescript: "TS",
        vue: "Vue",
        html: "HTML",
      };

      function renderSnippetFilter(snippets) {
        const filterEl = document.getElementById("snippet-filter");
        if (!filterEl) return;

        const langs = [...new Set(snippets.map((s) => s.language))];
        filterEl.innerHTML = "";

        const allTag = document.createElement("button");
        allTag.type = "button";
        allTag.className =
          "filter-tag" + (currentFilter === "all" ? " active" : "");
        allTag.textContent = "全部";
        allTag.onclick = () => {
          currentFilter = "all";
          renderSnippetList(allSnippets);
        };
        filterEl.appendChild(allTag);

        langs.forEach((lang) => {
          const count = snippets.filter((s) => s.language === lang).length;
          const tag = document.createElement("button");
          tag.type = "button";
          tag.className =
            "filter-tag" + (currentFilter === lang ? " active" : "");
          tag.textContent = (LANG_LABELS[lang] || lang) + " (" + count + ")";
          tag.onclick = () => {
            currentFilter = lang;
            renderSnippetList(allSnippets);
          };
          filterEl.appendChild(tag);
        });
      }

      function renderSnippetList(snippets) {
        const listEl = document.getElementById("snippet-list");
        const countEl = document.getElementById("snippet-count");
        if (!listEl) return;

        const filtered =
          currentFilter === "all"
            ? snippets
            : snippets.filter((s) => s.language === currentFilter);

        if (countEl) {
          countEl.textContent =
            "共 " +
            filtered.length +
            " 个" +
            (currentFilter !== "all" ? " / 总 " + snippets.length + " 个" : "");
        }

        renderSnippetFilter(snippets);

        if (filtered.length === 0) {
          listEl.innerHTML = '<div class="snippet-empty">暂无代码片段</div>';
          return;
        }

        listEl.innerHTML = "";
        filtered.forEach((snippet) => {
          const item = document.createElement("div");
          item.className = "snippet-item";

          const info = document.createElement("div");
          info.className = "snippet-info";
          info.onclick = () => item.classList.toggle("expanded");

          const nameEl = document.createElement("div");
          nameEl.className = "snippet-name";
          nameEl.textContent = snippet.name;

          const meta = document.createElement("div");
          meta.className = "snippet-meta";

          const prefix = document.createElement("span");
          prefix.className = "snippet-prefix";
          prefix.textContent = snippet.prefix;

          const lang = document.createElement("span");
          lang.className = "snippet-lang";
          lang.textContent = LANG_LABELS[snippet.language] || snippet.language;

          meta.appendChild(prefix);
          meta.appendChild(lang);

          info.appendChild(nameEl);
          info.appendChild(meta);

          if (snippet.description) {
            const desc = document.createElement("div");
            desc.className = "snippet-desc";
            desc.textContent = snippet.description;
            info.appendChild(desc);
          }

          const preview = document.createElement("div");
          preview.className = "snippet-preview";
          preview.textContent = snippet.bodyPreview || "";
          info.appendChild(preview);

          const actions = document.createElement("div");
          actions.className = "snippet-actions-col";

          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "snippet-action-btn delete";
          delBtn.textContent = "🗑";
          delBtn.title = "删除";
          delBtn.onclick = (e) => {
            e.stopPropagation();
            vscode.postMessage({
              type: "deleteSnippet",
              data: { name: snippet.name, language: snippet.language },
            });
          };

          actions.appendChild(delBtn);

          item.appendChild(info);
          item.appendChild(actions);
          listEl.appendChild(item);
        });
      }

      // 快速操作函数
      function insertLog() {
        vscode.postMessage({
          type: "quickInsert",
          data: { command: "extension.insertLogStatement" },
        });
      }

      function deleteAllLogs() {
        vscode.postMessage({
          type: "quickInsert",
          data: { command: "extension.deleteAllLogStatements" },
        });
      }

      function insertChoose() {
        vscode.postMessage({
          type: "quickInsert",
          data: { command: "extension.insertLogChoose" },
        });
      }

      // 代码片段操作
      function addSnippet() {
        const name = document.getElementById("snippet-name").value;
        const prefix = document.getElementById("snippet-prefix").value;
        const language = getSelectedLanguage();
        const description = document.getElementById(
          "snippet-description",
        ).value;
        const body = document.getElementById("snippet-body").value;

        if (!(name && prefix && body)) {
          alert("请填写名称、前缀和代码内容");
          return;
        }

        if (!language) {
          alert("请选择或输入语言");
          return;
        }

        vscode.postMessage({
          type: "addSnippet",
          data: { name, prefix, language, description, body },
        });

        document.getElementById("snippet-name").value = "";
        document.getElementById("snippet-prefix").value = "";
        document.getElementById("snippet-description").value = "";
        document.getElementById("snippet-body").value = "";
        document.getElementById("snippet-language").value = "javascript";
        document.getElementById("snippet-language-custom").value = "";
        document
          .getElementById("snippet-language-custom")
          .classList.remove("visible");
      }

      function importSnippets() {
        vscode.postMessage({ type: "importSnippets" });
      }

      function exportSnippets() {
        const language = document.getElementById("export-language").value;
        vscode.postMessage({
          type: "exportSnippets",
          data: { language },
        });
      }

      // 快捷键编辑
      const editingKeybindings = new Map();

      function startEditKeybinding(command) {
        const item = document.querySelector(
          `.kb-item[data-command="${command}"]`,
        );
        if (!item) return;

        const keyEl = item.querySelector(".kb-key");

        // 替换为输入框
        const input = document.createElement("input");
        input.type = "text";
        input.className = "keybinding-input";
        input.value = "";
        input.placeholder = "按下快捷键...";
        input.readOnly = true;
        keyEl.replaceWith(input);

        setTimeout(() => input.focus(), 10);

        input.addEventListener("keydown", (e) => {
          e.preventDefault();
          const keys = [];
          if (e.ctrlKey) keys.push("Ctrl");
          if (e.shiftKey) keys.push("Shift");
          if (e.altKey) keys.push("Alt");
          if (e.metaKey) keys.push("Cmd");

          let key = e.key;
          if (key === " ") key = "Space";
          else if (["Control", "Shift", "Alt", "Meta"].includes(key)) return;
          else if (key.length === 1) key = key.toUpperCase();

          keys.push(key);
          const newKeybinding = keys.join("+");
          input.value = newKeybinding;
          editingKeybindings.set(command, newKeybinding);
        });

        // 替换操作按钮
        const actions = item.querySelector(".kb-actions");
        actions.innerHTML = "";

        const saveBtn = document.createElement("button");
        saveBtn.className = "keybinding-btn keybinding-save";
        saveBtn.textContent = "保存";
        saveBtn.onclick = () => saveKeybinding(command);

        const cancelBtn = document.createElement("button");
        cancelBtn.className = "keybinding-btn keybinding-reset";
        cancelBtn.textContent = "取消";
        cancelBtn.onclick = () => cancelEditKeybinding(command);

        actions.appendChild(saveBtn);
        actions.appendChild(cancelBtn);
      }

      function saveKeybinding(command) {
        console.log(`[Lean Snippet] saveKeybinding 被调用: ${command}`);
        const newKeybinding = editingKeybindings.get(command);
        console.log(`[Lean Snippet] 新快捷键: ${newKeybinding}`);

        if (!newKeybinding) {
          console.warn("[Lean Snippet] 没有找到新的快捷键配置");
          vscode.postMessage({
            type: "showWarning",
            data: {
              message:
                "请先在输入框中按下新的快捷键组合！例如：按住 Shift+Ctrl 然后按字母键",
            },
          });
          return;
        }

        console.log("[Lean Snippet] 发送更新快捷键消息");
        vscode.postMessage({
          type: "updateKeybinding",
          data: { command, keybinding: newKeybinding },
        });
        editingKeybindings.delete(command);
      }

      function cancelEditKeybinding(command) {
        console.log(`[Lean Snippet] cancelEditKeybinding 被调用: ${command}`);
        editingKeybindings.delete(command);
        vscode.postMessage({ type: "getKeybindings" });
      }

      function resetKeybinding(command) {
        console.log(`[Lean Snippet] resetKeybinding 被调用: ${command}`);
        if (confirm("确定要重置此快捷键为默认值吗？")) {
          console.log("[Lean Snippet] 用户确认重置");
          vscode.postMessage({
            type: "resetKeybinding",
            data: { command },
          });
        } else {
          console.log("[Lean Snippet] 用户取消重置");
        }
      }

      // 接收消息
      window.addEventListener("message", (event) => {
        const message = event.data;
        console.log("Received message:", message);
        switch (message.type) {
          case "keybindings":
            console.log("Updating keybindings display with:", message.data);
            updateKeybindingsDisplay(message.data);
            break;
          case "snippets":
            allSnippets = message.data || [];
            renderSnippetList(allSnippets);
            break;
          default:
            break;
        }
      });

      function updateKeybindingsDisplay(keybindings) {
        const listEl = document.getElementById("keybindings-list");
        if (!listEl) return;

        if (!keybindings || keybindings.length === 0) {
          listEl.innerHTML =
            '<div style="padding:12px;text-align:center;color:var(--vscode-descriptionForeground)">暂无快捷键</div>';
          return;
        }

        listEl.innerHTML = "";
        keybindings.forEach((kb) => {
          const item = document.createElement("div");
          item.className = "kb-item";
          item.setAttribute("data-command", kb.command);

          const info = document.createElement("div");
          info.className = "kb-info";

          const name = document.createElement("div");
          name.className = "kb-name";
          name.textContent = kb.title;

          const key = document.createElement("span");
          key.className = "kb-key";
          key.textContent = kb.key || "未设置";

          info.appendChild(name);
          info.appendChild(key);

          const actions = document.createElement("div");
          actions.className = "kb-actions";

          const editBtn = document.createElement("button");
          editBtn.className = "keybinding-btn keybinding-save";
          editBtn.textContent = "编辑";
          editBtn.onclick = () => startEditKeybinding(kb.command);

          const resetBtn = document.createElement("button");
          resetBtn.className = "keybinding-btn keybinding-reset";
          resetBtn.textContent = "重置";
          resetBtn.onclick = () => resetKeybinding(kb.command);

          actions.appendChild(editBtn);
          actions.appendChild(resetBtn);

          item.appendChild(info);
          item.appendChild(actions);
          listEl.appendChild(item);
        });
      }

      console.log("Requesting initial data...");
      vscode.postMessage({ type: "getKeybindings" });
      vscode.postMessage({ type: "getSnippets" });
    </script>
  </body>
</html>
